<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>アイラッシュ電子カルテ</title>
<style>
:root{--bg:#FDFAF7;--card:#FFF;--pri:#C4957A;--pri-l:#F5EDE8;--pri-d:#A07860;--acc:#7BAF9E;--acc-l:#E8F4F1;--txt:#2D2926;--txt-s:#7A6E68;--bdr:#E8DDD8;--r:12px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;color:var(--txt);}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#hdr{background:var(--card);border-bottom:1px solid var(--bdr);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
#hdr h1{font-size:17px;font-weight:700;color:var(--pri-d);flex:1;}
#content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
#bnav{background:var(--card);border-top:1px solid var(--bdr);display:flex;flex-shrink:0;}
.nb{flex:1;padding:10px 4px 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--txt-s);font-family:inherit;}
.nb.active{color:var(--pri);}
.nb svg{width:22px;height:22px;}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden;}
.screen.active{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:10px;overflow:hidden;}
.ci{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--bdr);cursor:pointer;background:var(--card);}
.ci:last-child{border-bottom:none;}
.ca{width:42px;height:42px;border-radius:50%;background:var(--pri-l);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.cinf{flex:1;min-width:0;}
.cnm{font-size:15px;font-weight:600;}
.ckn{font-size:11px;color:var(--txt-s);}
.ctm{font-size:13px;font-weight:600;color:var(--pri);}
.cmn{font-size:11px;color:var(--txt-s);}
.sb{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;}
.sw{background:#FFF3E0;color:#E65100;}
.sd{background:var(--acc-l);color:#2E7D6A;}
.dnav{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--bdr);flex-shrink:0;}
.dnav button{width:32px;height:32px;border-radius:50%;border:1px solid var(--bdr);background:var(--bg);cursor:pointer;font-size:16px;}
.dlabel{flex:1;text-align:center;font-size:15px;font-weight:700;}
.sf{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--bdr);flex-shrink:0;}
.sfb{padding:5px 14px;border-radius:20px;border:1px solid var(--bdr);background:var(--card);font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;}
.sfb.active{background:var(--pri);color:white;border-color:var(--pri);}
.srch{padding:10px 12px;background:var(--card);border-bottom:1px solid var(--bdr);flex-shrink:0;}
.si{width:100%;padding:10px 14px;border-radius:25px;border:1px solid var(--bdr);font-size:15px;font-family:inherit;background:var(--bg);outline:none;}
#det{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;}
#det.open{transform:translateX(0);}
.dh{background:var(--card);border-bottom:1px solid var(--bdr);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.bb{width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--bg);cursor:pointer;font-size:18px;}
.dn{font-size:17px;font-weight:700;flex:1;}
.dtabs{display:flex;background:var(--card);border-bottom:1px solid var(--bdr);flex-shrink:0;overflow-x:auto;}
.dt{padding:11px 16px;font-size:13px;font-weight:600;color:var(--txt-s);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit;background:none;border-left:none;border-right:none;border-top:none;}
.dt.active{color:var(--pri);border-bottom-color:var(--pri);}
.dbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;}
.fr{margin-bottom:14px;}
.fl{font-size:12px;font-weight:600;color:var(--txt-s);margin-bottom:5px;display:block;}
.fi,.fs,.ft{width:100%;padding:10px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:14px;font-family:inherit;background:var(--card);color:var(--txt);outline:none;}
.ft{resize:none;min-height:70px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cr{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.chk{display:flex;align-items:center;gap:5px;font-size:13px;}
.st{font-size:13px;font-weight:700;color:var(--pri-d);background:var(--pri-l);padding:8px 12px;border-radius:8px;margin-bottom:10px;margin-top:16px;}
.st:first-child{margin-top:0;}
.kw{border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;background:white;}
.ktb{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-bottom:1px solid var(--bdr);flex-wrap:wrap;}
.pc{width:24px;height:24px;border-radius:50%;border:2px solid white;box-shadow:0 0 0 1px #ccc;cursor:pointer;flex-shrink:0;}
.pc.active{box-shadow:0 0 0 2px var(--pri);}
.psb{padding:4px 10px;border-radius:20px;border:1px solid var(--bdr);background:var(--card);font-size:12px;cursor:pointer;font-family:inherit;}
.psb.active{background:var(--pri);color:white;border-color:var(--pri);}
.kcw{position:relative;}
.kcw img{width:100%;display:block;}
.kcw canvas{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;}
.km{display:grid;grid-template-columns:1fr 1px 1fr;border-top:1px solid var(--bdr);}
.km textarea{border:none;outline:none;padding:10px;font-size:12px;font-family:inherit;background:transparent;resize:none;min-height:55px;}
.km .dv{background:var(--bdr);}
.sw2{border:1px solid var(--bdr);border-radius:8px;overflow:hidden;background:white;}
.sc{display:block;width:100%;height:80px;touch-action:none;}
.sa{display:flex;gap:8px;margin-top:8px;}
.btn{padding:11px 20px;border-radius:25px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.bp{background:var(--pri);color:white;}
.bs{background:var(--bg);color:var(--txt);border:1px solid var(--bdr);}
.bd{background:#FFE5E5;color:#C0392B;border:none;}
.bb2{width:100%;}
.bsm{padding:7px 14px;font-size:12px;}
.ctabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;}
.ctab{padding:7px 16px;border-radius:20px;border:1px solid var(--bdr);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
.ctab.active{background:var(--acc);color:white;border-color:var(--acc);}
.ctxt{font-size:12px;line-height:1.8;color:var(--txt);background:#FAFAFA;border-radius:8px;padding:12px;max-height:250px;overflow-y:auto;white-space:pre-wrap;border:1px solid var(--bdr);margin-bottom:10px;}
.sgn{display:flex;align-items:center;gap:6px;background:#E8F5E9;color:#2E7D32;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:8px;}
.hc{background:var(--card);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:12px;overflow:hidden;}
.hd{background:var(--pri-l);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.hdv{font-size:15px;font-weight:700;color:var(--pri-d);}
.hs{font-size:12px;color:var(--txt-s);}
.hsrv{display:inline-block;background:var(--pri);color:white;font-size:11px;padding:3px 10px;border-radius:20px;margin:8px 14px 4px;}
.hb{padding:8px 14px 14px;}
.him{width:100%;border-radius:8px;border:1px solid var(--bdr);display:block;margin-top:8px;}
.hm{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.hmi{background:var(--bg);border-radius:6px;padding:8px;font-size:12px;}
.hmi label{display:block;font-size:10px;color:var(--txt-s);margin-bottom:3px;}
.uz{border:2px dashed var(--bdr);border-radius:var(--r);padding:30px;text-align:center;color:var(--txt-s);cursor:pointer;background:var(--bg);font-size:14px;}
.empty{text-align:center;padding:50px 20px;color:var(--txt-s);font-size:14px;}
.ei{font-size:40px;margin-bottom:12px;}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--txt);color:white;padding:10px 20px;border-radius:25px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="14" fill="#C4957A"/><ellipse cx="14" cy="15" rx="6" ry="4" fill="white" opacity=".9"/><circle cx="14" cy="14" r="3" fill="#2D2926"/><circle cx="15.2" cy="12.8" r="1" fill="white"/></svg>
    <h1>アイラッシュ電子カルテ</h1>
  </div>
  <div id="content">
    <div id="screen-list" class="screen active">
      <div class="dnav">
        <button onclick="chgDate(-1)">‹</button>
        <div class="dlabel" id="dlabel"></div>
        <button onclick="chgDate(1)">›</button>
        <button onclick="goToday()" style="padding:5px 12px;border-radius:20px;border:1px solid var(--bdr);background:var(--bg);font-size:12px;cursor:pointer;font-family:inherit">今日</button>
      </div>
      <div class="sf" id="sf"></div>
      <div class="scroll" id="list-body"></div>
    </div>
    <div id="screen-search" class="screen">
      <div class="srch"><input class="si" id="si" placeholder="🔍 名前・フリガナで検索" oninput="doSearch(this.value)"></div>
      <div class="scroll" id="search-body"><div class="empty"><div class="ei">🔍</div>名前またはフリガナで検索</div></div>
    </div>
    <div id="screen-csv" class="screen">
      <div class="scroll">
        <div class="card"><div style="padding:12px 14px;font-size:13px;font-weight:700;color:var(--txt-s);background:var(--bg);border-bottom:1px solid var(--bdr)">📥 サロンボード CSV取込</div><div style="padding:12px 14px">
          <div class="uz" onclick="document.getElementById('cf').click()"><div style="font-size:32px;margin-bottom:8px">📂</div><div>CSVファイルを選択</div><div style="font-size:12px;margin-top:4px">UTF-8 / Shift-JIS 自動判別</div></div>
          <input type="file" id="cf" accept=".csv" style="display:none" onchange="handleCSV(this)">
          <div id="csv-res" style="margin-top:12px"></div>
        </div></div>
        <div class="card"><div style="padding:12px 14px;font-size:13px;font-weight:700;color:var(--txt-s);background:var(--bg);border-bottom:1px solid var(--bdr)">⚙️ スタッフ設定</div><div style="padding:12px 14px">
          <div id="staff-disp"></div>
          <div style="display:flex;gap:8px;margin-top:10px"><input class="fi" id="ns" placeholder="スタッフ名を追加" style="flex:1"><button class="btn bp bsm" onclick="addStaff()">追加</button></div>
        </div></div>
        <div class="card"><div style="padding:12px 14px;font-size:13px;font-weight:700;color:#C0392B;background:#FFF5F5;border-bottom:1px solid #FFD0D0">🗑️ データリセット</div><div style="padding:12px 14px">
          <div style="font-size:13px;color:var(--txt-s);margin-bottom:12px">お客様データ・予約データ・スタッフ設定を全て削除します。CSVを再取込みする前にご利用ください。</div>
          <button class="btn bd bb2" onclick="resetAllData()">⚠️ 全データをリセットする</button>
        </div></div>
      </div>
    </div>
  </div>
  <div id="bnav">
    <button class="nb active" onclick="swTab('list',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>予約</button>
    <button class="nb" onclick="swTab('search',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>検索</button>
    <button class="nb" onclick="swTab('csv',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>CSV</button>
  </div>
</div>
<div id="det">
  <div class="dh"><button class="bb" onclick="closeDet()">‹</button><div class="dn" id="det-nm"></div><div style="font-size:12px;color:var(--txt-s)" id="det-sub"></div></div>
  <div class="dtabs">
    <button class="dt active" onclick="swDet('basic',this)">基本情報</button>
    <button class="dt" onclick="swDet('counsel',this)">カウンセリング</button>
    <button class="dt" onclick="swDet('karte',this)">施術記録</button>
    <button class="dt" onclick="swDet('hist',this)">来店履歴</button>
  </div>
  <div class="dbody" id="dbody"></div>
</div>
<div id="toast"></div>
<script>
var staffList = JSON.parse(localStorage.getItem('sl')||'["佐藤","鈴木","田中"]');
var customers = JSON.parse(localStorage.getItem('cs')||'[]');
var curDate = new Date();
var curStaff = 'all';
var curCust = null;
var curDTab = 'basic';
var curCType = 'exte';
var sigDrawing=false,sigLX=0,sigLY=0,sigCtx=null;
var karteDrawing=false,karteLX=0,karteLY=0,karteCtx=null;
var kartePenColor='#1a1a1a',kartePenSize=3;

function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtD(d){var days=['日','月','火','水','木','金','土'];return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+days[d.getDay()]+'）';}
function sv(){localStorage.setItem('cs',JSON.stringify(customers));}
function svSt(){localStorage.setItem('sl',JSON.stringify(staffList));}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

if(customers.length===0){
  var td=fmt(new Date());
  customers=[
    {id:'c1',name:'山田 花子',kana:'ヤマダ ハナコ',phone:'090-0000-0001',birthday:'1990-05-15',reservations:[{date:td,time:'10:00',staff:'佐藤',menu:'まつげエクステ（Cカール）',status:'waiting'}],records:[],signed_exte:false,signed_perm:false,signed_wax:false},
    {id:'c2',name:'鈴木 あい',kana:'スズキ アイ',phone:'090-0000-0002',birthday:'1995-03-20',reservations:[{date:td,time:'11:30',staff:'鈴木',menu:'まつげパーマ',status:'waiting'}],records:[],signed_exte:false,signed_perm:false,signed_wax:false},
    {id:'c3',name:'田中 美咲',kana:'タナカ ミサキ',phone:'090-0000-0003',birthday:'1988-11-08',reservations:[{date:td,time:'13:00',staff:'佐藤',menu:'アイブロウWAX',status:'done'}],records:[],signed_exte:false,signed_perm:false,signed_wax:false}
  ];
  sv();
}

function swTab(n,btn){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('active');});
  document.getElementById('screen-'+n).classList.add('active');
  btn.classList.add('active');
  if(n==='list')renderList();
  if(n==='csv')renderStaff();
}
function chgDate(d){curDate.setDate(curDate.getDate()+d);renderList();}
function goToday(){curDate=new Date();renderList();}
function setStaff(s){curStaff=s;renderList();}

function renderList(){
  document.getElementById('dlabel').textContent=fmtD(curDate);
  var ds=fmt(curDate);
  var sf=document.getElementById('sf');
  // 当日の予約からスタッフ一覧も取得（staffListに追加）
  var staffSet = [];
  customers.forEach(function(c){
    (c.reservations||[]).forEach(function(r){
      if(r.staff && staffSet.indexOf(r.staff)<0) staffSet.push(r.staff);
      if(r.staff && staffList.indexOf(r.staff)<0){ staffList.push(r.staff); svSt(); }
    });
  });
  var displayStaff = staffList.length ? staffList : staffSet;
  sf.innerHTML='<button class="sfb'+(curStaff==='all'?' active':'')+'" onclick="setStaff(\'all\')">全員</button>'
    +displayStaff.map(function(s){return '<button class="sfb'+(curStaff===s?' active':'')+'" onclick="setStaff(\''+s+'\')">'+s+'</button>';}).join('');
  var list=[];
  customers.forEach(function(c){
    (c.reservations||[]).forEach(function(r){
      if(r.date===ds&&(curStaff==='all'||r.staff===curStaff))list.push({c:c,r:r});
    });
  });
  list.sort(function(a,b){return(a.r.time||'').localeCompare(b.r.time||'');});
  var el=document.getElementById('list-body');
  if(!list.length){el.innerHTML='<div class="empty"><div class="ei">📅</div>この日の予約はありません</div>';return;}
  el.innerHTML='<div class="card">'+list.map(function(item){
    var c=item.c,r=item.r;
    return '<div class="ci" onclick="openDet(\''+c.id+'\')">'
      +'<div class="ca">💐</div>'
      +'<div class="cinf"><div class="cnm">'+c.name+'</div><div class="ckn">'+c.kana+'</div></div>'
      +'<div style="text-align:right"><div class="ctm">'+(r.time&&r.time!=='00:00'?r.time:'時間未定')+'</div><div class="cmn">'+r.menu+'</div>'
      +'<div style="margin-top:3px"><span class="sb '+(r.status==='done'?'sd':'sw')+'">'+(r.status==='done'?'完了':'待機中')+'</span></div></div>'
      +'</div>';
  }).join('')+'</div>';
}

function doSearch(q){
  q=q.trim();
  var el=document.getElementById('search-body');
  if(!q){el.innerHTML='<div class="empty"><div class="ei">🔍</div>名前またはフリガナで検索</div>';return;}
  var res=customers.filter(function(c){return c.name.includes(q)||c.kana.includes(q);});
  if(!res.length){el.innerHTML='<div class="empty"><div class="ei">😢</div>見つかりませんでした</div>';return;}
  el.innerHTML='<div class="card">'+res.map(function(c){
    return '<div class="ci" onclick="openDet(\''+c.id+'\')">'
      +'<div class="ca">💐</div><div class="cinf"><div class="cnm">'+c.name+'</div><div class="ckn">'+c.kana+'</div></div>'
      +'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>'
      +'</div>';
  }).join('')+'</div>';
}

function openDet(id){
  curCust=customers.find(function(c){return c.id===id;});
  if(!curCust)return;
  document.getElementById('det-nm').textContent=curCust.name;
  document.getElementById('det-sub').textContent=curCust.kana;
  curDTab='basic';
  document.querySelectorAll('.dt').forEach(function(t,i){t.classList.toggle('active',i===0);});
  document.getElementById('det').classList.add('open');
  renderDet();
}
function closeDet(){document.getElementById('det').classList.remove('open');renderList();}

function swDet(tab,btn){
  curDTab=tab;
  document.querySelectorAll('.dt').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  renderDet();
}

function renderDet(){
  var el=document.getElementById('dbody');
  if(curDTab==='basic')el.innerHTML=renderBasic();
  else if(curDTab==='counsel'){el.innerHTML=renderCounsel();setTimeout(initSig,200);}
  else if(curDTab==='karte'){el.innerHTML=renderKarte();setTimeout(initKarte,150);}
  else if(curDTab==='hist')el.innerHTML=renderHist();
}

function renderBasic(){
  var c=curCust;
  return '<div class="st">👤 基本情報</div>'
    +'<div class="fr"><label class="fl">お名前</label><input class="fi" value="'+c.name+'" onchange="upd(\'name\',this.value)"></div>'
    +'<div class="fr"><label class="fl">フリガナ</label><input class="fi" value="'+c.kana+'" onchange="upd(\'kana\',this.value)"></div>'
    +'<div class="fg"><div class="fr"><label class="fl">生年月日</label><input class="fi" type="date" value="'+(c.birthday||'')+'" onchange="upd(\'birthday\',this.value)"></div>'
    +'<div class="fr"><label class="fl">携帯番号</label><input class="fi" value="'+(c.phone||'')+'" onchange="upd(\'phone\',this.value)"></div></div>'
    +'<div class="st">📋 直近の予約</div>'
    +((c.reservations||[]).slice(0,3).map(function(r){

function initSig(){
  var c=document.getElementById('sig-c');
  if(!c)return;
  var w=c.parentElement.clientWidth||300;
  c.width=w;c.height=80;
  sigCtx=c.getContext('2d');
  sigCtx.strokeStyle='#2D2926';sigCtx.lineWidth=2;sigCtx.lineCap='round';sigCtx.lineJoin='round';
  if(c._init)return;c._init=true;
  function gp(e){var r=c.getBoundingClientRect();var t=e.changedTouches?e.changedTouches[0]:(e.touches?e.touches[0]:e);return{x:(t.clientX-r.left)*c.width/r.width,y:(t.clientY-r.top)*c.height/r.height};}
  function sd(e){e.preventDefault();sigDrawing=true;var p=gp(e);sigLX=p.x;sigLY=p.y;sigCtx.beginPath();sigCtx.arc(p.x,p.y,1,0,Math.PI*2);sigCtx.fillStyle='#2D2926';sigCtx.fill();}
  function sm(e){if(!sigDrawing)return;e.preventDefault();var p=gp(e);sigCtx.beginPath();sigCtx.moveTo(sigLX,sigLY);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigLX=p.x;sigLY=p.y;}
  c.addEventListener('mousedown',sd,{passive:false});
  c.addEventListener('touchstart',sd,{passive:false});
  c.addEventListener('mousemove',sm,{passive:false});
  c.addEventListener('touchmove',sm,{passive:false});
  c.addEventListener('mouseup',function(){sigDrawing=false;});
  c.addEventListener('touchend',function(){sigDrawing=false;});
  c.addEventListener('mouseleave',function(){sigDrawing=false;});
}
function clrSig(){var c=document.getElementById('sig-c');if(c&&sigCtx)sigCtx.clearRect(0,0,c.width,c.height);}
function saveSig(tp){

  var ds=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate()+' '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');

}

function initKarte(){
  var bg=document.getElementById('kbg');
  var c=document.getElementById('kc');
  if(!c||!bg)return;
  function setup(){
    var wrap=bg.parentElement;
    var w=bg.offsetWidth,h=bg.offsetHeight;
    if(w<10||h<10){setTimeout(setup,100);return;}
    wrap.style.position='relative';
    c.width=w;c.height=h;
    karteCtx=c.getContext('2d');
    karteCtx.lineCap='round';karteCtx.lineJoin='round';
    if(c._ki)return;c._ki=true;
    function gp(e){var r=c.getBoundingClientRect();var t=e.changedTouches?e.changedTouches[0]:(e.touches?e.touches[0]:e);return{x:(t.clientX-r.left)*c.width/r.width,y:(t.clientY-r.top)*c.height/r.height};}
    function dot(p){karteCtx.fillStyle=kartePenColor;karteCtx.beginPath();karteCtx.arc(p.x,p.y,kartePenSize/2,0,Math.PI*2);karteCtx.fill();karteLX=p.x;karteLY=p.y;}
    function line(p){karteCtx.strokeStyle=kartePenColor;karteCtx.lineWidth=kartePenSize;karteCtx.beginPath();karteCtx.moveTo(karteLX,karteLY);karteCtx.lineTo(p.x,p.y);karteCtx.stroke();karteLX=p.x;karteLY=p.y;}
    c.addEventListener('mousedown',function(e){e.preventDefault();karteDrawing=true;dot(gp(e));},{passive:false});
    c.addEventListener('touchstart',function(e){e.preventDefault();karteDrawing=true;dot(gp(e));},{passive:false});
    c.addEventListener('mousemove',function(e){if(!karteDrawing)return;e.preventDefault();line(gp(e));},{passive:false});
    c.addEventListener('touchmove',function(e){if(!karteDrawing)return;e.preventDefault();line(gp(e));},{passive:false});
    c.addEventListener('mouseup',function(){karteDrawing=false;});
    c.addEventListener('touchend',function(){karteDrawing=false;});
    c.addEventListener('mouseleave',function(){karteDrawing=false;});
  }
  if(bg.complete&&bg.naturalWidth>0)setup();
  else bg.onload=setup;
}

function saveKarte(){
  var c=document.getElementById('kc'),bg=document.getElementById('kbg');
  var img='';
  if(c&&bg&&bg.complete&&bg.naturalWidth>0){
    var tmp=document.createElement('canvas');
    tmp.width=c.width;tmp.height=c.height;
    var tc=tmp.getContext('2d');
    tc.drawImage(bg,0,0,c.width,c.height);
    tc.drawImage(c,0,0);
    img=tmp.toDataURL('image/jpeg',0.85);
  }
  var kd=document.getElementById('kd');
  var kst=document.getElementById('kst');
  var kmn=document.getElementById('kmn');
  var kmr=document.getElementById('kmr');
  var kml=document.getElementById('kml');
  var knt=document.getElementById('knt');
  var rec={
    date:kd?kd.value:'',
    staff:kst?kst.value:'',
    menu:kmn?kmn.value:'',
    memo_r:kmr?kmr.value:'',
    memo_l:kml?kml.value:'',
    note:knt?knt.value:'',
    karte_img:img,
    at:new Date().toISOString()
  };
  if(!curCust.records)curCust.records=[];
  curCust.records.unshift(rec);
  sv();
  toast('📝 施術記録を保存しました');
  curDTab='hist';
  document.querySelectorAll('.dt').forEach(function(t,i){t.classList.toggle('active',i===3);});
  renderDet();
}

      html+='<div class="hc">'

    });
  }
  return html||'<div class="empty"><div class="ei">📋</div>まだ記録がありません</div>';
}

function handleCSV(inp){
  var file=inp.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(e){
    var txt=e.target.result;
    if(txt.indexOf('\ufffd')>=0){
      var r2=new FileReader();
      r2.onload=function(e2){parseCSV(new TextDecoder('shift-jis').decode(e2.target.result));};
      r2.readAsArrayBuffer(file);
    }else parseCSV(txt);
  };
  r.readAsText(file,'UTF-8');
}

function parseCSV(txt){
  var lines=txt.split(/\r?\n/).filter(function(l){return l.trim();});
  if(lines.length<2){
    document.getElementById('csv-res').innerHTML='<div style="color:red">データが見つかりません</div>';
    return;
  }
  var hdrs=csvSplit(lines[0]);
  var added=0, updated=0;

  lines.slice(1).forEach(function(line){
    var cols=csvSplit(line), row={};
    hdrs.forEach(function(h,i){
      // 列名のスペース・全角スペース・括弧を正規化して格納
      var key = h.trim().replace(/[\s\u3000]/g,'');
      row[key] = (cols[i]||'').trim();
      // 元のキー（trimのみ）でも格納
      row[h.trim()] = (cols[i]||'').trim();
    });

    // ステータス確認（キャンセルは除外）
    var status = row['ステータス']||'';
    if(status.indexOf('キャンセル')>=0) return;

    // 顧客情報（ホットペッパー: お名前列、電話予約: 氏名(漢字)列）
    // 列名を全角・半角カッコ両対応で取得
    var name  = row['お名前']||row['氏名(漢字)']||row['氏名（漢字）']||row['顧客名']||row['名前']||row['氏名']||'';
    var kana  = row['フリガナ']||row['氏名(カナ)']||row['氏名（カナ）']||row['ふりがな']||'';

    // 電話番号は複数列にある可能性があるので全部チェック
    var allPhones = Object.keys(row).filter(function(k){ return k.indexOf('電話番号')>=0||k==='携帯番号'||k==='TEL'; });
    var phone = '';
    for(var pi=0;pi<allPhones.length;pi++){ if(row[allPhones[pi]]){ phone=row[allPhones[pi]]; break; } }
    var bookingNum = row['予約番号']||'';
    var route = row['予約経路']||'';

    // 予約情報
    var staff = row['スタッフ名']||row['担当']||row['担当者']||'';
    var menu  = row['予約時メニュー']||row['予約時メニューカテゴリ']||row['施術メニュー']||row['メニュー']||'';

    // 来店日: 20260411 → 2026-04-11（電話予約は来店日のみ、HPは両方あり）
    var rawDate = row['来店日']||row['予約日']||'';
    var date = normD(rawDate);

    // 開始時間: 1900 → 19:00（複数列を試す）
    var rawTime = row['開始時間']||row['来店時間']||row['予約時間']||
                  row['開始時間（来店）']||row['予約開始時間']||'';
    var time = normT(rawTime);
    // timeが空の場合は '00:00' をデフォルトに（日付だけでも登録）
    if(!time && date) time = '00:00';

    if(!name){
      if(kana) {
        // フリガナがあればそれを名前として使用
        name = kana;
      } else if(bookingNum) {
        name = '（電話）'+time+' '+staff;
      } else return;
    }
    if(!kana) kana = name;

    // 予約ステータス変換
    var resStatus = 'waiting';
    if(status==='会計済み') resStatus='done';

    // 同一顧客の判定: 電話番号 > 名前+フリガナの順で照合
    var ex = null;
    if(phone){
      ex = customers.find(function(c){ return c.phone && c.phone===phone; });
    }
    if(!ex && name){
      ex = customers.find(function(c){
        return c.name===name && (c.kana===kana || !kana || !c.kana);
      });
    }

    if(ex){
      // 予約追加（日時で重複チェック）
      if(date){
        var dup = ex.reservations.some(function(r){
          return r.date===date && r.time===time;
        });
        if(!dup){
          ex.reservations.push({date:date,time:time,menu:menu,staff:staff,status:resStatus});
          updated++;
        }
        // 情報更新
        if(phone && !ex.phone) ex.phone = phone;
        if(kana && !ex.kana) ex.kana = kana;
      }
    }else{
      var nc={
        id: 'c'+(Date.now()+added)+'_'+Math.random().toString(36).slice(2,6),
        name: name,
        kana: kana||name,
        phone: phone,
        reservations: date ? [{date:date,time:time,menu:menu,staff:staff,status:resStatus}] : [],
        records: [],
        signed_exte:false, signed_perm:false, signed_wax:false
      };
      customers.push(nc);
      added++;
    }
  });

  // CSVから取得したスタッフ名をstaffListに自動追加
  customers.forEach(function(c){
    (c.reservations||[]).forEach(function(r){
      if(r.staff && !staffList.includes(r.staff)){
        staffList.push(r.staff);
      }
    });
  });
  sv();
  svSt();

  // 取込んだ日付の最初の日にジャンプ
  var allDates = [];
  customers.forEach(function(c){
    (c.reservations||[]).forEach(function(r){
      if(r.date) allDates.push(r.date);
    });
  });
  allDates.sort();
  // 今日以降の最初の予約日にジャンプ
  var today = fmt(new Date());
  var nextDate = allDates.find(function(d){ return d >= today; });
  if(nextDate){
    var parts = nextDate.split('-');
    curDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  }

  // デバッグ: 全顧客の予約状況を表示

  
  document.getElementById('csv-res').innerHTML=
    '<div style="background:var(--acc-l);color:var(--acc);padding:12px;border-radius:8px;font-size:14px">'
    +'✅ 取込完了：新規 '+added+' 件、更新 '+updated+' 件</div>';
  renderList();
}

function csvSplit(line){
  // タブ区切りかカンマ区切りか自動判定
  if(line.indexOf('	')>=0){
    return line.split('	').map(function(s){return s.replace(/^"|"$/g,'').trim();});
  }
  var res=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    if(line[i]==='"'){inQ=!inQ;continue;}
    if(line[i]===','&&!inQ){res.push(cur);cur='';continue;}
    cur+=line[i];
  }
  res.push(cur);return res;
}

function normD(s){
  if(!s)return'';
  s=String(s).trim().replace(/[\s\u3000]/g,'');
  // 20260412 形式（数値8桁）
  if(/^\d{8}$/.test(s)){
    return s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8);
  }
  // 2026/04/12 や 2026-04-12 や 2026年4月12日
  s=s.replace(/[年月]/g,'-').replace(/日/g,'').replace(/\//g,'-');
  var m=s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
  return m ? m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0') : '';
}

function normT(s){
  if(!s)return'';
  s=String(s).trim().replace(/[:\s\u3000]/g,'');
  // 数字のみ抽出
  var nums=s.replace(/[^\d]/g,'');
  if(nums.length>=3 && nums.length<=4){
    var p=nums.padStart(4,'0');
    return p.slice(0,2)+':'+p.slice(2,4);
  }
  return s;
}


function renderStaff(){
  var el=document.getElementById('staff-disp');
  el.innerHTML=staffList.map(function(s,i){
    return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)"><span style="flex:1">'+s+'</span><button class="btn bd bsm" onclick="rmStaff('+i+')">削除</button></div>';
  }).join('');
}
function addStaff(){
  var inp=document.getElementById('ns'),n=inp.value.trim();
  if(!n)return;
  staffList.push(n);svSt();inp.value='';renderStaff();toast('スタッフを追加しました');
}
function rmStaff(i){staffList.splice(i,1);svSt();renderStaff();}

function resetAllData(){
  if(!confirm('全データ（お客様・予約・スタッフ設定）をリセットしますか？\nこの操作は元に戻せません。')){return;}
  localStorage.removeItem('cs');
  localStorage.removeItem('sl');
  customers=[];
  staffList=['佐藤','鈴木','田中'];
  sv();svSt();
  renderList();
  renderStaff();
  toast('✅ データをリセットしました');
}

renderList();
